# USB sound card. With onboard audio disabled this should be card 0.
# Confirm on hardware with: aplay -l
ADEVICE plughw:0,0
ARATE 48000
ACHANNELS 1

CHANNEL 0
MYCALL MB7UJM
MODEM 1200

# BCM GPIO 25 is physical header pin 22. Prefix the line number with "-"
# if the PTT interface is active-low. Drive the radio through a suitable
# transistor/optoisolator interface, never directly from the 3.3 V GPIO.
PTT GPIOD gpiochip0 25

# Conservative 1200-baud VHF timing defaults. Tune TXDELAY on-air.
TXDELAY 30
TXTAIL 10
SLOTTIME 10
PERSIST 63

# APRS-IS login passcodes are derived from the callsign and are not secrets.
IGSERVER euro.aprs2.net
IGLOGIN MB7UJM 17336

# This starts as a receive-only iGate: RF packets are uploaded to APRS-IS,
# but Internet traffic is not transmitted. Before enabling two-way gating,
# add the site's approved beacon/location, an appropriate IGFILTER, and an
# IGTXVIA line matching the NoV and local APRS coordination.
